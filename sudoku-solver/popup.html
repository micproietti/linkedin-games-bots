<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      margin: 0;
    }
    h3 { margin-top: 0; margin-bottom: 10px; color: #0a66c2; }
    p { font-size: 13px; color: #666; margin-bottom: 15px; }
    
    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    button {
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }
    
    #solveBtn { background-color: #0a66c2; }
    #solveBtn:hover:not(:disabled) { background-color: #004182; }
    #solveBtn:disabled { background-color: #057642; cursor: default; } /* Turns green when solving */
    
    #stopBtn { background-color: #d11124; }
    #stopBtn:hover:not(:disabled) { background-color: #a00d1b; }
    #stopBtn:disabled { background-color: #cccccc; color: #888888; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>Sudoku Solver</h3>
  <p>Click below when the game is loaded.</p>
  
  <div class="btn-container">
    <button id="solveBtn">Solve It!</button>
    <button id="stopBtn" disabled>Stop Solving</button>
  </div>

  <script src="popup.js"></script> 
</body>
</html>
